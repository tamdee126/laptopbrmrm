<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบยืม-คืน Labtop โรงพยาบาลแม่ระมาด</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS ภายในสำหรับฟอนต์และสี (ตามบริบทการสนทนา) */
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #e9ecef; /* Light gray-blue background */
        }
        .container-card {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15); 
        }
        .hospital-primary {
            background-color: #007bff; /* Blue */
        }
        .hospital-text {
            color: #007bff;
        }
        .loader {
            border-top-color: #007bff;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @-webkit-keyframes spinner {
            0% { -webkit-transform: rotate(0deg); }
            100% { -webkit-transform: rotate(360deg); }
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex items-center justify-center">

    <div class="container-card w-full max-w-5xl bg-white rounded-xl p-6 md:p-10">
        <header class="text-center mb-8">
            <h1 class="text-3xl lg:text-4xl font-extrabold hospital-text mb-2">
                🩺 ระบบยืม-คืนอุปกรณ์ IT
            </h1>
            <p class="text-xl font-semibold text-gray-600 border-b pb-4">
                โรงพยาบาลแม่ระมาด (Labtop & Equipment Management)
            </p>
        </header>
        
        <form id="loanForm" class="space-y-6">
            <h2 class="text-2xl font-bold text-gray-800 border-l-4 border-blue-500 pl-3 mb-6">📝 บันทึกการดำเนินการ (ยืม/คืน)</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <div class="space-y-6">
                    <div>
                        <label for="action" class="block text-base font-medium text-gray-700 mb-1">การดำเนินการ <span class="text-red-500">*</span></label>
                        <!-- NAME: action (สำหรับ doPost) -->
                        <select id="action" name="action" required 
                            class="mt-1 block w-full px-4 py-3 border border-gray-300 bg-white rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-lg transition duration-150 ease-in-out appearance-none">
                            <option value="ยืม" selected>▶️ ยืมอุปกรณ์</option>
                            <option value="คืน">↩️ คืนอุปกรณ์</option>
                        </select>
                    </div>

                    <div>
                        <label for="equipment" class="block text-base font-medium text-gray-700 mb-1">รายการอุปกรณ์ที่เลือก <span class="text-red-500">*</span></label>
                        <!-- NAME: equipment (สำหรับ doPost) -->
                        <select id="equipment" name="equipment" required 
                            class="mt-1 block w-full px-4 py-3 border border-gray-300 bg-white rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-lg transition duration-150 ease-in-out appearance-none">
                            <option value="" disabled selected>--- เลือกอุปกรณ์ที่สามารถทำรายการได้ ---</option>
                            </select>
                    </div>

                    <div>
                        <label for="borrowerName" class="block text-base font-medium text-gray-700 mb-1">ชื่อผู้ปฏิบัติงาน (ผู้ยืม/ผู้คืน) <span class="text-red-500">*</span></label>
                        <!-- NAME: borrowerName (สำหรับ doPost) -->
                        <input type="text" id="borrowerName" name="borrowerName" required placeholder="กรุณาป้อน ชื่อจริงและนามสกุล"
                            class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-lg transition duration-150 ease-in-out">
                    </div>
                </div>

                <div class="space-y-6">
                    <div id="departmentGroup">
                        <label for="department" class="block text-base font-medium text-gray-700 mb-1">หน่วยงาน / แผนก <span class="text-red-500">*</span></label>
                        <!-- NAME: department (สำหรับ doPost) -->
                        <input type="text" id="department" name="department" placeholder="เช่น: ฝ่าย IT, แผนกผู้ป่วยนอก" required
                            class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-lg transition duration-150 ease-in-out">
                    </div>

                    <div id="phoneNumberGroup">
                        <label for="phoneNumber" class="block text-base font-medium text-gray-700 mb-1">เบอร์โทรศัพท์ติดต่อ <span class="text-red-500">*</span></label>
                        <!-- NAME: phoneNumber (สำหรับ doPost) -->
                        <input 
                            type="text" 
                            id="phoneNumber" 
                            name="phoneNumber" 
                            placeholder="ตัวอย่าง: 0912345678 (ต้องมี 10 หลัก)" 
                            pattern="[0-9]{10}"
                            title="เบอร์โทรศัพท์ต้องมี 10 หลัก เช่น 0912345678"
                            maxlength="10"
                            required
                            class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-lg transition duration-150 ease-in-out">
                    </div>
                    
                    <div id="dueDateGroup">
                        <label for="dueDate" class="block text-base font-medium text-gray-700 mb-1">📅 กำหนดการคืน <span class="text-red-500">*</span></label>
                        <!-- NAME: dueDate (สำหรับ doPost) -->
                        <input type="date" id="dueDate" name="dueDate" required
                            class="mt-1 block w-full px-4 py-3 border border-gray-300 bg-white rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-lg transition duration-150 ease-in-out">
                    </div>

                </div>
            </div> 
            
            <div id="reasonGroup">
                <label for="reason" class="block text-base font-medium text-gray-700 mb-1">เหตุผลในการยืม <span class="text-red-500">*</span></label>
                <!-- NAME: reason (สำหรับ doPost) -->
                <textarea id="reason" name="reason" rows="3" placeholder="โปรดระบุเหตุผลในการยืมอย่างละเอียด เช่น: ประชุมนอกสถานที่, อบรม, ใช้แทนเครื่องที่เสียชั่วคราว" required
                    class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out text-lg"></textarea>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-lg text-lg font-bold text-white hospital-primary hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-300 ease-in-out transform hover:scale-[1.01] mt-8">
                <svg id="submitIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span id="submitText">บันทึกการดำเนินการ</span>
            </button>
        </form>

        <div id="statusMessage" class="mt-6 p-4 rounded-lg text-lg font-semibold hidden transition duration-300"></div>

        <div id="loader" class="mt-6 flex justify-center items-center hidden">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-8 w-8"></div>
            <span class="ml-3 text-lg text-gray-600" id="loaderText">กำลังดึงสถานะอุปกรณ์...</span>
        </div>

        <div class="mt-10 pt-6 border-t border-gray-200">
            <h2 class="text-2xl font-bold text-gray-800 border-l-4 border-green-600 pl-3 mb-4">🖥️ สถานะอุปกรณ์ปัจจุบัน (Real-time)</h2>
            <p class="text-sm text-gray-500 mb-4">
                *อัปเดตสถานะแบบ Real-time จาก Log ล่าสุดที่บันทึก
            </p>
            <div id="equipmentList" class="space-y-4">
                <p class="text-center text-gray-500 p-4 bg-gray-50 rounded-lg">กำลังโหลดรายการอุปกรณ์...</p>
            </div>
        </div>
    </div>
    
    <script>
    // *****************************************************************************************************************
    // *** ⚠️ สำคัญมาก: โปรดเปลี่ยน URL นี้เป็น Web App URL ที่คุณได้รับจากการ Deploy Google Apps Script ***
    // *****************************************************************************************************************
    // ใช้ URL ล่าสุดที่คุณให้มาในบริบทการสนทนา
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzwClVjQBa_vnVgurZdS7BWnXBWPb_yGquA0bwJ0TpeN6DXZZqNmR8nBQvOk8iuMcgZ/exec"; 
    // ข้อมูลอุปกรณ์คงที่ (สามารถปรับเปลี่ยนได้ตามความจำเป็น)
    const equipmentInventory = [
        { name: "HP Pavilion Gaming", details: "（รับ 1/9/2020 RMC 16994 No.7440-013-0002/0033）" },
        { name: "Asus X512DA-EJ1021T (15.6) สีส้ม", details: "（รับ 15/5/2020 RMC 16760 NO.7440-013-0002/0030）" },
        { name: "Asus N/b asus D413A สีดำ", details: "（รับ 15/5/2020 RMC 14993 NO.7440-013-0002/0026）" },
        { name: "MSI modern 14 b5m สีดำ เครื่องเล็ก", details: "（รับ 25/08/2021 RMC 17609 NO.7440-013-0002/0040）" },
        { name: "MSI GF63 Thin 10SCXR-1634TH สีดำ (15.6) ", details: "（รับ 01/10/2021 RMC 17649 NO.7440-013-0002/0041）" },
        { name: "Lenovo ThinkPad AMD RYZEN 5 4000 SERIES สีดำ", details: "（ไม่มีเลขครุภัณฑ์）" },
        { name: "Acer Aspire Lite 15", details: "OPD01/2569（ไม่มีเลขครุภัณฑ์）" },
    ];

    let currentEquipmentStatus = {}; // เก็บสถานะล่าสุดของอุปกรณ์

    // Element Selectors
    const form = document.getElementById('loanForm');
    const equipmentSelect = document.getElementById('equipment');
    const equipmentListDiv = document.getElementById('equipmentList');
    const actionSelect = document.getElementById('action');
    const dueDateGroup = document.getElementById('dueDateGroup');
    const reasonGroup = document.getElementById('reasonGroup');
    const departmentInput = document.getElementById('department');
    const phoneNumberInput = document.getElementById('phoneNumber');
    const reasonTextarea = document.getElementById('reason');
    const statusMessage = document.getElementById('statusMessage');
    const loader = document.getElementById('loader');
    const loaderText = document.getElementById('loaderText');
    const submitBtn = document.getElementById('submitBtn');
    const submitText = document.getElementById('submitText');
    const submitIcon = document.getElementById('submitIcon');


    // Helper function สำหรับแสดง Loader และจัดการปุ่ม
    function toggleLoader(show, text = 'กำลังบันทึกข้อมูล...') {
        loaderText.textContent = text;
        if (show) {
            loader.classList.remove('hidden');
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            submitText.textContent = 'กำลังดำเนินการ...';
            submitIcon.classList.add('hidden'); // ซ่อนไอคอน Submit
        } else {
            loader.classList.add('hidden');
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            // อัปเดตข้อความปุ่มตาม Action ปัจจุบัน
            submitText.textContent = `บันทึกการดำเนินการ${actionSelect.value === 'ยืม' ? ' (ยืม)' : ' (คืน)'}`;
            submitIcon.classList.remove('hidden'); 
        }
    }

    // Helper function สำหรับแสดงสถานะข้อความ
    function showMessage(message, isSuccess = true) {
        statusMessage.textContent = message;
        statusMessage.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700', 'bg-yellow-100', 'text-yellow-700');
        statusMessage.classList.add(isSuccess ? 'bg-green-100' : 'bg-red-100', isSuccess ? 'text-green-700' : 'text-red-700');
        setTimeout(() => {
            statusMessage.classList.add('hidden');
        }, 5000);
    }

    // 1. สร้างและอัปเดต Dropdown List อุปกรณ์ตามสถานะและ Action ที่เลือก
    function updateEquipmentSelectOptions() {
        const selectedAction = actionSelect.value;
        const isBorrowAction = selectedAction === 'ยืม';
        
        equipmentSelect.innerHTML = '<option value="" disabled selected>--- เลือกอุปกรณ์ที่สามารถทำรายการได้ ---</option>';
        submitText.textContent = `บันทึกการดำเนินการ${isBorrowAction ? ' (ยืม)' : ' (คืน)'}`;


        let optionsAdded = 0;

        equipmentInventory.forEach(item => {
            const equipmentName = item.name;
            const statusInfo = currentEquipmentStatus[equipmentName];
            // สถานะพร้อมใช้งานคือ: ไม่มี log หรือ log ล่าสุดคือ 'คืน'
            const isAvailable = !statusInfo || statusInfo.action === 'คืน';

            let shouldAdd = false;
            let displayStatus = item.details;

            if (isBorrowAction) {
                // ยืม: แสดงเฉพาะอุปกรณ์ที่พร้อมใช้งาน
                if (isAvailable) {
                    shouldAdd = true;
                    displayStatus = `✅ พร้อมให้ยืม | ${item.details}`;
                }
            } else {
                // คืน: แสดงเฉพาะอุปกรณ์ที่ถูกยืมอยู่
                if (!isAvailable) {
                    shouldAdd = true;
                    const borrower = statusInfo.borrowerName || 'ไม่ระบุ';
                    const dueDate = statusInfo.dueDate ? new Date(statusInfo.dueDate).toLocaleDateString('th-TH') : 'ไม่ระบุ';
                    displayStatus = `⚠️ ถูกยืมโดย: ${borrower} (กำหนดคืน: ${dueDate})`;
                }
            }

            if (shouldAdd) {
                const option = document.createElement('option');
                option.value = equipmentName;
                option.textContent = `${equipmentName} - ${displayStatus}`;
                equipmentSelect.appendChild(option);
                optionsAdded++;
            }
        });

        // เพิ่มตัวเลือกแจ้งเตือนหากไม่มีอุปกรณ์ให้เลือกตาม Action
        if (optionsAdded === 0) {
            const msg = document.createElement('option');
            msg.value = "N/A";
            msg.disabled = true;
            msg.textContent = isBorrowAction ? '❌ ไม่มีอุปกรณ์พร้อมให้ยืมในขณะนี้' : '✅ ไม่มีอุปกรณ์ที่ถูกยืมอยู่ (Log สะอาด)';
            equipmentSelect.appendChild(msg);
            submitBtn.disabled = true; // ปิดปุ่ม Submit ถ้าไม่มีรายการให้ทำ
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
        } else {
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
    }


    // 2. คำนวณสถานะปัจจุบันจาก Log
    function calculateCurrentStatus(logs) {
        const statusMap = {}; 
        // ประมวลผล Log เพื่อหาสถานะล่าสุด (Log ที่ใหม่ที่สุดจะชนะ)
        logs.forEach(log => {
            statusMap[log.equipment] = {
                action: log.action,
                borrowerName: log.borrowerName,
                department: log.department, // เก็บข้อมูลเพิ่มเติมสำหรับแสดงผล
                phoneNumber: log.phoneNumber, // เก็บข้อมูลเพิ่มเติมสำหรับแสดงผล
                reason: log.reason, // เก็บข้อมูลเพิ่มเติมสำหรับแสดงผล
                dueDate: log.dueDate
            };
        });

        currentEquipmentStatus = statusMap;
    }

    // 3. แสดงรายการอุปกรณ์พร้อมสถานะ Real-time
    function renderEquipmentList() {
        equipmentListDiv.innerHTML = ''; 
        let allAvailable = true;

        equipmentInventory.forEach(item => {
            const statusInfo = currentEquipmentStatus[item.name];
            let statusText = '';
            let statusClass = '';
            let detailText = item.details;

            let extraInfo = '';

            if (statusInfo && statusInfo.action === 'ยืม') {
                // ถูกยืม
                allAvailable = false;
                const borrower = statusInfo.borrowerName || 'ไม่ระบุชื่อ';
                const dept = statusInfo.department || 'ไม่ระบุแผนก';
                const phone = statusInfo.phoneNumber || 'ไม่มีเบอร์โทร';
                const reason = statusInfo.reason || 'ไม่ระบุเหตุผล';
                const dueDate = statusInfo.dueDate ? new Date(statusInfo.dueDate).toLocaleDateString('th-TH') : 'ไม่ระบุ';
                statusText = `⛔ ถูกยืม (คืน ${dueDate})`;
                statusClass = 'bg-red-50 text-red-700 border-red-300 shadow-lg';
                extraInfo = `
                    <div class="mt-2 text-xs md:text-sm text-red-600 bg-red-100 p-2 rounded-lg space-y-1">
                        <p><strong class="font-bold">ผู้ยืม:</strong> ${borrower} (${dept})</p>
                        <p><strong class="font-bold">ติดต่อ:</strong> ${phone}</p>
                        <p><strong class="font-bold">เหตุผล:</strong> ${reason}</p>
                    </div>
                `;
            } else {
                // พร้อมใช้งาน
                statusText = '✅ พร้อมใช้งาน';
                statusClass = 'bg-green-50 text-green-700 border-green-300';
            }
            
            // Format details to be less prominent
            const formattedDetails = `<span class="text-xs text-gray-500 mt-1 md:mt-0 md:ml-4 flex-grow truncate">${detailText}</span>`;


            const itemDiv = document.createElement('div');
            itemDiv.className = `p-4 rounded-xl border flex flex-col transition duration-150 ease-in-out hover:shadow-xl ${statusClass}`;
            itemDiv.innerHTML = `
                <div class="flex flex-col md:flex-row md:justify-between md:items-center">
                    <span class="font-bold text-gray-800">${item.name}</span>
                    ${formattedDetails}
                    <span class="text-sm font-semibold mt-2 md:mt-0 md:ml-auto whitespace-nowrap">${statusText}</span>
                </div>
                ${extraInfo}
            `;
            equipmentListDiv.appendChild(itemDiv);
        });

        if (allAvailable && equipmentInventory.length > 0) {
             const allAvailableMsg = document.createElement('div');
             allAvailableMsg.className = 'p-4 text-center bg-blue-100 text-blue-700 rounded-lg font-semibold';
             allAvailableMsg.textContent = '🥳 อุปกรณ์ทั้งหมดพร้อมให้ยืม!';
             equipmentListDiv.insertBefore(allAvailableMsg, equipmentListDiv.firstChild);
        } else if (equipmentInventory.length === 0) {
             equipmentListDiv.innerHTML = `<p class="text-center text-gray-500 p-4 bg-gray-50 rounded-lg">ไม่มีรายการอุปกรณ์ในคลัง</p>`;
        }
    }

    // 4. ดึง Log ทั้งหมดจาก Apps Script (GET request)
    async function fetchRealtimeStatus() {
        toggleLoader(true, 'กำลังดึงสถานะอุปกรณ์...');
        equipmentListDiv.innerHTML = '<p class="text-center text-gray-500 p-4 bg-gray-50 rounded-lg">กำลังโหลดรายการอุปกรณ์...</p>';

        try {
            // ใช้ exponential backoff สำหรับการเรียก API
            const maxRetries = 3;
            let response;

            for (let i = 0; i < maxRetries; i++) {
                try {
                    response = await fetch(APPS_SCRIPT_URL, {
                        method: 'GET',
                        redirect: 'follow', 
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' } 
                    });

                    if (response.ok) break; // สำเร็จ
                    
                    if (i < maxRetries - 1) {
                        const delay = Math.pow(2, i) * 1000; // 1s, 2s, 4s
                        await new Promise(resolve => setTimeout(resolve, delay));
                    } else {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                } catch (error) {
                    if (i === maxRetries - 1) throw error; // โยน error ออกไปถ้าลองครบแล้ว
                }
            }
            
            if (!response || !response.ok) {
                throw new Error("Failed to fetch status after multiple retries.");
            }

            const result = await response.json();
            
            if (result.status === 'success') {
                calculateCurrentStatus(result.logs);
                renderEquipmentList();
                updateEquipmentSelectOptions(); 
            } else {
                showMessage(`❌ เกิดข้อผิดพลาดในการดึงสถานะ: ${result.message || 'ไม่ทราบข้อผิดพลาด'}`, false);
                equipmentListDiv.innerHTML = `<p class="text-center text-red-500 p-4 bg-red-100 rounded-lg">เกิดข้อผิดพลาดในการโหลดสถานะ: ${result.message || 'กรุณาตรวจสอบ Console'}</p>`;
            }
        } catch (error) {
            console.error("Fetch GET Error:", error);
            showMessage(`❌ ไม่สามารถเชื่อมต่อกับ Web App URL ได้ กรุณาตรวจสอบ Console และ URL`, false);
            equipmentListDiv.innerHTML = `<p class="text-center text-red-500 p-4 bg-red-100 rounded-lg">ไม่สามารถเชื่อมต่อกับ Web App URL ได้ กรุณาตรวจสอบ Console และ URL</p>`;
        } finally {
            toggleLoader(false);
        }
    }

    // 5. จัดการการเปลี่ยนแปลง Action (ยืม/คืน)
    actionSelect.addEventListener('change', (e) => {
        const isBorrow = e.target.value === 'ยืม';

        // จัดการการแสดง/ซ่อนช่อง Due Date และ Reason
        if (isBorrow) {
            dueDateGroup.classList.remove('hidden');
            reasonGroup.classList.remove('hidden'); 
            document.getElementById('dueDate').setAttribute('required', 'required');
            document.getElementById('reason').setAttribute('required', 'required');
        } else {
            dueDateGroup.classList.add('hidden');
            reasonGroup.classList.add('hidden'); 
            document.getElementById('dueDate').removeAttribute('required');
            document.getElementById('reason').removeAttribute('required');
        }
        
        // หน่วยงานและเบอร์โทรศัพท์ ถูกกำหนดให้เป็น Required เสมอ
        departmentInput.setAttribute('required', 'required');
        phoneNumberInput.setAttribute('required', 'required');

        // อัปเดตรายการอุปกรณ์ใน Dropdown ตาม Action ที่เลือก
        updateEquipmentSelectOptions();
    });

    // 6. จัดการการ Submit Form (POST request)
    form.addEventListener('submit', async (e) => {
        // ให้เบราว์เซอร์ทำการตรวจสอบ HTML5 Validation (เช่น pattern="[0-9]{10}") โดยอัตโนมัติก่อน
        if (!form.checkValidity()) {
            // หากฟอร์มไม่ถูกต้อง จะมีการแสดงข้อความเตือนของเบราว์เซอร์เอง
            return;
        }

        e.preventDefault();

        // 1. ดึงข้อมูล
        const action = actionSelect.value;
        const equipment = equipmentSelect.value;
        const borrowerName = document.getElementById('borrowerName').value;
        const department = departmentInput.value; 
        const phoneNumber = phoneNumberInput.value.trim(); // ใช้ค่าจาก input type="text"
        
        // 🚨 หมายเหตุ: การตรวจสอบ 10 หลักถูกจัดการโดย pattern="[0-9]{10}" ใน HTML แล้ว


        // ส่งข้อมูลที่จำเป็นเท่านั้น
        const reason = (action === 'ยืม') ? reasonTextarea.value : 'การคืนอุปกรณ์'; 
        const dueDate = (action === 'ยืม') ? document.getElementById('dueDate').value : '';


        // 2. ตรวจสอบข้อมูลพื้นฐาน (ส่วนที่ HTML5 Validation ไม่ครอบคลุม)
        if (equipmentSelect.value === "" || equipmentSelect.value === "N/A" || equipmentSelect.value.startsWith('---')) {
             showMessage("❗ กรุณาเลือกรายการอุปกรณ์ที่สามารถทำรายการได้", false);
             return;
        }
        if (borrowerName.trim() === "" || department.trim() === "") {
             showMessage("❗ กรุณาระบุ ชื่อ และ หน่วยงาน/แผนก ให้ครบถ้วน", false);
             return;
        }
        if (action === 'ยืม' && (dueDate.trim() === "" || reasonTextarea.value.trim() === "")) { // ใช้ reasonTextarea.value เพื่อตรวจสอบการกรอก
             showMessage("❗ กรุณาระบุวันกำหนดคืน และ เหตุผลในการยืม ให้ครบถ้วน", false);
             return;
        }
        
        // 3. ตรวจสอบสถานะการยืมซ้ำ/คืนผิด (Double check against current status)
        const currentStatus = currentEquipmentStatus[equipment];
        const isCurrentlyBorrowed = currentStatus && currentStatus.action === 'ยืม';

        if (action === 'ยืม' && isCurrentlyBorrowed) {
            showMessage(`❌ อุปกรณ์ ${equipment} ถูกยืมอยู่โดย ${currentStatus.borrowerName} ไม่สามารถยืมซ้ำได้!`, false);
            return;
        }

        if (action === 'คืน' && !isCurrentlyBorrowed) {
            showMessage(`❌ อุปกรณ์ ${equipment} ไม่ได้อยู่ในสถานะถูกยืม ไม่สามารถทำรายการคืนได้!`, false);
            return;
        }


        // 4. ดำเนินการ POST
        toggleLoader(true, `กำลังบันทึกข้อมูลการ${action}...`);
        
        // สร้าง URLSearchParams เพื่อรวมพารามิเตอร์ทั้งหมดสำหรับ POST
        const params = new URLSearchParams();
        params.append('action', action);
        params.append('equipment', equipment);
        params.append('borrowerName', borrowerName);
        params.append('department', department); 
        params.append('phoneNumber', phoneNumber); // ใช้ค่าจาก input (ถูกส่งเป็น String)
        params.append('reason', reason); // Reason มีค่าเสมอ (ถ้าคืนจะเป็น 'การคืนอุปกรณ์')
        params.append('dueDate', dueDate); // dueDate มีค่าเมื่อ 'ยืม' เท่านั้น
        
        // ฟังก์ชันสำหรับเรียก API พร้อม Exponential Backoff
        const postDataWithRetry = async () => {
            const maxRetries = 3;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        body: params, 
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded'
                        }
                    });
                    
                    if (response.ok) return response; // สำเร็จ
                    
                    if (i < maxRetries - 1) {
                        const delay = Math.pow(2, i) * 1000; // 1s, 2s, 4s
                        await new Promise(resolve => setTimeout(resolve, delay));
                    } else {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                } catch (error) {
                    if (i === maxRetries - 1) throw error; // โยน error ออกไปถ้าลองครบแล้ว
                }
            }
            throw new Error("Failed to submit data after multiple retries.");
        };


        try {
            const response = await postDataWithRetry();
            const result = await response.json();
            
            if (result.status === 'success') {
                showMessage(`✅ บันทึกการ${action}สำเร็จ! อุปกรณ์: ${equipment} ถูกอัปเดตสถานะแล้ว`, true);
                
                // Clear form fields
                document.getElementById('borrowerName').value = '';
                departmentInput.value = '';
                phoneNumberInput.value = '';
                reasonTextarea.value = '';
                document.getElementById('dueDate').value = '';

                // Reset Action select and trigger change to reset dropdown/visibility
                actionSelect.value = 'ยืม';
                actionSelect.dispatchEvent(new Event('change')); 
                
                // ดึงสถานะใหม่ทันทีหลังจากบันทึกสำเร็จ
                await fetchRealtimeStatus(); 

            } else {
                showMessage(`❌ เกิดข้อผิดพลาดในการบันทึก: ${result.message || 'ไม่สามารถติดต่อ Google Sheet ได้'}`, false);
            }

        } catch (error) {
            console.error("Fetch Error:", error);
            showMessage(`❌ เกิดข้อผิดพลาดในการเชื่อมต่อ: ${error.message}`, false);
        } finally {
            toggleLoader(false);
        }
    });

    // Initial setup
    window.onload = () => {
        // เมื่อโหลดหน้า ให้ดึงสถานะจริงและตั้งค่าฟอร์มเริ่มต้น
        fetchRealtimeStatus(); 
        actionSelect.dispatchEvent(new Event('change')); // Set initial state for Due Date & Dropdown
    };
</script>
</body>
</html>
